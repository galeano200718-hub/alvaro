name: Actualizar Lista IPTV Combinada
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: # ESTO ES LO QUE FALTA
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Descargar y combinar listas
        run: |
          echo "#EXTM3U" > Alvaro.m3u
          curl -L https://iptv-org.github.io/iptv/countries/py.m3u | grep -v "#EXTM3U" >> Alvaro.m3u
          curl -L https://iptv-org.github.io/iptv/languages/spa.m3u | grep -v "#EXTM3U" >> Alvaro.m3u

      - name: Subir cambios a GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Alvaro.m3u
          git commit -m "Sincronización automática de lista"
          git push
